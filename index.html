<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Radio Nest Ultra Player - Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #fff;
      --subtext: rgba(255,255,255,0.7);
      --glass: rgba(0,0,0,0.25);
      --title-color: #fff;
      --slider-track: linear-gradient(90deg, #ffffff 0%, #d0d0d0 100%);
      --slider-thumb: #ffffff;
      --slider-thumb-glow: rgba(255,255,255,0.6);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      background: transparent;
      overflow: hidden;
      color: var(--text);
    }

    .widget-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      padding: 12px 16px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      max-width: 480px;
      margin: 0;
    }

    .align-left { margin-left: 0; margin-right: auto; }
    .align-center { margin-left: auto; margin-right: auto; }
    .align-right { margin-left: auto; margin-right: 0; }

    .art-wrap {
      width: 150px;
      height: 150px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    @media (min-width: 1025px) {
      .art-wrap {
        width: 200px;
        height: 200px;
      }
    }

    .art-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
    }

    .art-img.fade { opacity: 0; }

    .fallback-chip {
      position: absolute;
      left: 8px;
      bottom: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.5);
      color: #fff;
      display: none;
    }

    .meta-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .onair-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--subtext);
    }

    .onair-label span { color: #ff9c35; }

    .track-title {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.2;
      word-break: break-word;
    }

    .track-sub {
      font-size: 12px;
      color: var(--subtext);
    }

    .play-btn {
      width: 100%;
      max-width: 120px;
      height: 36px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: #fff;
      color: #000;
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }

    .volume-wrap {
      width: 100%;
      max-width: 160px;
    }

    .volume-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      cursor: pointer;
      background: var(--slider-track);
      outline: none;
      border: none;
      -webkit-appearance: none;
    }
  </style>
</head>

<body>

<script>
/* ---------------- FALLBACK ART (ADDED) ---------------- */
const FALLBACK_ART = "https://i.ibb.co/Jj588RKm/Live-Stream-Default-Album-Art.png";

/* ---------------- LICENSE CHECK ---------------- */
async function checkLicense() {
  const urlParams = new URLSearchParams(window.location.search);
  const licenseKey = urlParams.get("license");

  if (!licenseKey) return false;

  try {
    const res = await fetch(
      `https://licensingworker.myradionest.workers.dev/validate?key=${licenseKey}`
    );
    const data = await res.json();
    return data.valid;
  } catch {
    return false;
  }
}

/* ---------------- INIT PLAYER ---------------- */
async function initPlayer() {
  const urlParams = new URLSearchParams(window.location.search);

  const streamURL = urlParams.get("stream");
  const metaURL = urlParams.get("meta");
  const align = urlParams.get("align") || "center";

  const wrapper = document.querySelector(".widget-wrap");
  wrapper.classList.add(`align-${align}`);

  const artworkEl = document.querySelector(".art-img");
  const fallbackChip = document.querySelector(".fallback-chip");
  const titleEl = document.querySelector(".track-title");
  const subEl = document.querySelector(".track-sub");
  const playBtn = document.querySelector(".play-btn");
  const volumeBar = document.querySelector(".volume-bar");

  const audio = new Audio(streamURL);
  audio.crossOrigin = "anonymous";

  playBtn.addEventListener("click", () => {
    if (audio.paused) {
      audio.play();
      playBtn.textContent = "Pause";
    } else {
      audio.pause();
      playBtn.textContent = "Play";
    }
  });

  audio.volume = volumeBar ? volumeBar.value / 100 : 1.0;

  if (volumeBar) {
    volumeBar.addEventListener("input", () => {
      audio.volume = volumeBar.value / 100;
    });
  }

  if (metaURL) {
    fetchMetadata();
    setInterval(fetchMetadata, 5000);
  } else {
    applyFallbackMetadata();
  }

  /* ---------------- METADATA ---------------- */
  function applyFallbackMetadata() {
    titleEl.textContent = "Live Stream";
    subEl.textContent = "";
    showFallback();
  }

  function showFallback() {
    if (artworkEl.src !== FALLBACK_ART) {
      artworkEl.classList.add("fade");
      setTimeout(() => {
        artworkEl.src = FALLBACK_ART;
        artworkEl.classList.remove("fade");
      }, 200);
    }
    fallbackChip.style.display = "none";
  }

  /* ---------------- HISTORY WORKER ---------------- */
  function sendHistoryUpdate(title, artist, artUrl) {
    if (!title) return;
    const workerUrl = "https://radiohistoryworker.sthelensliveradio.workers.dev/update";
    const url =
      workerUrl +
      `?title=${encodeURIComponent(title)}` +
      `&artist=${encodeURIComponent(artist || "")}` +
      `&art=${encodeURIComponent(artUrl || "")}`;

    fetch(url).catch(() => {});
  }

  /* ---------------- FETCH METADATA ---------------- */
  async function fetchMetadata() {
    try {
      const res = await fetch(metaURL + "?_=" + Date.now());
      const data = await res.json();

      let source = data.icestats && data.icestats.source;
      if (Array.isArray(source)) source = source[0];
      source = source || {};

      let raw = source.title || "";

      if (!raw.trim()) {
        applyFallbackMetadata();
        return;
      }

      const cleanTitle = raw.trim();

      titleEl.textContent = cleanTitle;
      subEl.textContent = "";

      updateArtwork(cleanTitle, "");

    } catch {
      applyFallbackMetadata();
    }
  }

  /* ---------------- ARTWORK ---------------- */
  async function updateArtwork(title, artist) {
    const query = encodeURIComponent(title.trim());

    if (!query) {
      showFallback();
      sendHistoryUpdate(title, artist, FALLBACK_ART);
      return;
    }

    try {
      const res = await fetch(
        `https://itunes.apple.com/search?term=${query}&entity=song&limit=1`
      );
      const data = await res.json();

      let finalArt = FALLBACK_ART;

      if (data.results && data.results.length > 0) {
        let art = data.results[0].artworkUrl100;
        art = art.replace("100x100bb.jpg", "1200x1200bb.jpg");
        finalArt = art;

        if (artworkEl.src !== art) {
          artworkEl.classList.add("fade");
          setTimeout(() => {
            artworkEl.src = art;
            artworkEl.classList.remove("fade");
          }, 200);
        }

        fallbackChip.style.display = "none";
      } else {
        showFallback();
      }

      sendHistoryUpdate(title, artist, finalArt);

    } catch {
      showFallback();
      sendHistoryUpdate(title, artist, FALLBACK_ART);
    }
  }
}

/* ---------------- START ---------------- */
checkLicense().then(valid => {
  if (valid) initPlayer();
});
</script>

</body>
</html>
