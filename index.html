<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Radio Nest Ultra Player - Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #fff;
      --subtext: rgba(255,255,255,0.7);
      --glass: rgba(0,0,0,0.25);
      --title-color: #fff;
      --slider-track: linear-gradient(90deg, #ffffff 0%, #d0d0d0 100%);
      --slider-thumb: #ffffff;
      --slider-thumb-glow: rgba(255,255,255,0.6);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      background: transparent;
      overflow: hidden;
      color: var(--text);
    }

    /* Widget container */
    .widget-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      padding: 12px 16px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Artwork */
    .art-wrap {
      width: 150px;
      height: 150px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .art-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
    }

    .art-img.fade {
      opacity: 0;
    }

    .fallback-chip {
      position: absolute;
      left: 8px;
      bottom: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.5);
      color: #fff;
      display: none;
    }

    /* Metadata + controls */
    .meta-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .onair-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--subtext);
    }

    .onair-label span {
      color: #ff9c35;
    }

    .track-title {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.2;
      word-break: break-word;
    }

    .track-sub {
      font-size: 12px;
      color: var(--subtext);
    }

    .play-btn {
      width: 100%;
      max-width: 120px;
      height: 36px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: #fff;
      color: #000;
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }

    .volume-wrap {
      width: 100%;
      max-width: 160px;
    }

    .volume-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      cursor: pointer;
      background: var(--slider-track);
      outline: none;
      border: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .volume-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--slider-thumb);
      margin-top: -4px;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .volume-bar::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px var(--slider-thumb-glow);
      transform: scale(1.05);
    }

    /* Powered by Radio Nest */
    .powered-by {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.85;
    }

    .powered-by a {
      color: #4da3ff;
      text-decoration: underline;
      font-weight: 600;
      cursor: pointer;
    }

    /* MOBILE/TABLET: Hide volume slider */
    @media (max-width: 1024px) {
      .volume-wrap {
        display: none;
      }
    }

    /* MOBILE: Switch to vertical layout */
    @media (max-width: 480px) {
      .widget-wrap {
        flex-direction: column;
        max-width: 100%;
        padding: 16px;
      }

      .art-wrap {
        width: 180px;
        height: 180px;
      }

      .meta-wrap {
        align-items: center;
        text-align: center;
      }
    }
  </style>
</head>

<body>

<div class="widget-wrap" id="playerArea">

  <div class="art-wrap">
    <img id="artwork" class="art-img" src="" alt="">
    <div id="fallbackChip" class="fallback-chip">NO ARTWORK</div>
  </div>

  <div class="meta-wrap">
    <div class="onair-label"><span>●</span> NOW PLAYING</div>

    <div id="trackTitle" class="track-title">Loading…</div>
    <div id="trackSub" class="track-sub"></div>

    <button id="playButton" class="play-btn">PLAY</button>

    <div class="volume-wrap">
      <input id="volumeBar" class="volume-bar" type="range" min="0" max="100" value="100">
    </div>

    <div class="powered-by">
      <a href="https://myradionest.com" target="_blank">Powered by Radio Nest</a>
    </div>
  </div>

</div>

<script>
/* --- your full JS logic remains unchanged --- */
const params = new URLSearchParams(window.location.search);
const streamURL = params.get("stream");
const metaURL = params.get("meta");
const licenseKey = params.get("license");

const licenseURL = "https://raw.githubusercontent.com/radionest01/radio-nest-ultra-radio-player/main/licenses.json";

async function checkLicense() {
  try {
    const res = await fetch(licenseURL + "?_=" + Date.now());
    const data = await res.json();

    if (!data.licenses || !Array.isArray(data.licenses)) {
      return showInvalid("data");
    }

    const license = data.licenses.find(l => l.key === licenseKey);

    if (!license) return showInvalid("invalid");

    if (license.expires !== "never") {
      const today = new Date();
      const expiry = new Date(license.expires);
      if (today > expiry) return showInvalid("expired");
    }

    return true;

  } catch {
    return showInvalid("data");
  }
}

function showInvalid(reason) {
  let title = "";
  let message = "";

  if (reason === "expired") {
    title = "License Expired";
    message = `The license for the Radio Nest Ultra Player has expired. Renew your licence at 
      <a href="https://myradionest.com" target="_blank" style="color:#4da3ff;">myradionest.com</a>.`;
  } else {
    title = "Invalid License";
    message = "This Radio Nest Ultra Player is not licensed.";
  }

  document.getElementById("playerArea").innerHTML = `
    <div style="width:100%;text-align:center;padding:40px 20px;color:#fff;">
      <h1 style="font-size:24px;margin-bottom:10px;">${title}</h1>
      <p style="font-size:14px;opacity:0.7;">${message}</p>
    </div>
  `;

  return false;
}

let artworkEl;
let fallbackChip;

const FALLBACK_ART = "https://i.ibb.co/Jj588RKm/Live-Stream-Default-Album-Art.png";

function initPlayer() {
  audio = new Audio();
  audio.src = streamURL;
  audio.preload = "none";
  audio.crossOrigin = "anonymous";

  playButton = document.getElementById("playButton");
  volumeBar  = document.getElementById("volumeBar");
  titleEl    = document.getElementById("trackTitle");
  subEl      = document.getElementById("trackSub");
  artworkEl  = document.getElementById("artwork");
  fallbackChip = document.getElementById("fallbackChip");

  playButton.addEventListener("click", () => {
    if (audio.paused) {
      audio.play();
      playButton.textContent = "STOP";
    } else {
      audio.pause();
      playButton.textContent = "PLAY";
    }
  });

  audio.volume = volumeBar ? volumeBar.value / 100 : 1.0;

  if (volumeBar) {
    volumeBar.addEventListener("input", () => {
      audio.volume = volumeBar.value / 100;
    });
  }

  if (metaURL) {
    fetchMetadata();
    setInterval(fetchMetadata, 5000);
  } else {
    applyFallbackMetadata();
  }
}

function applyFallbackMetadata() {
  titleEl.textContent = "Live Stream";
  subEl.textContent = "";
  showFallback();
}

function showFallback() {
  if (artworkEl.src !== FALLBACK_ART) {
    artworkEl.classList.add("fade");
    setTimeout(() => {
      artworkEl.src = FALLBACK_ART;
      artworkEl.classList.remove("fade");
    }, 200);
  }
  fallbackChip.style.display = "none";
}

async function fetchMetadata() {
  try {
    const res = await fetch(metaURL + "?_=" + Date.now());
    const data = await res.json();

    let source = data.icestats && data.icestats.source;
    if (Array.isArray(source)) source = source[0];
    source = source || {};

    let raw = source.title || "";

    if (!raw.trim()) {
      applyFallbackMetadata();
      return;
    }

    titleEl.textContent = raw.trim();
    subEl.textContent = "";

    updateArtwork(raw.trim(), "");

  } catch {
    applyFallbackMetadata();
  }
}

async function updateArtwork(title, artist) {
  const query = encodeURIComponent(title.trim());

  if (!query) {
    showFallback();
    return;
  }

  try {
    const res = await fetch(
      `https://itunes.apple.com/search?term=${query}&entity=song&limit=1`
    );
    const data = await res.json();

    if (data.results && data.results.length > 0) {
      let art = data.results[0].artworkUrl100;
      art = art.replace("100x100bb.jpg", "1200x1200bb.jpg");

      if (artworkEl.src !== art) {
        artworkEl.classList.add("fade");
        setTimeout(() => {
          artworkEl.src = art;
          artworkEl.classList.remove("fade");
        }, 200);
      }

      fallbackChip.style.display = "none";
    } else {
      showFallback();
    }
  } catch {
    showFallback();
  }
}

checkLicense().then(valid => {
  if (valid) initPlayer();
});
</script>

</body>
</html>
