<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Radio Nest Ultra Player - Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #fff;
      --subtext: rgba(255,255,255,0.7);
      --glass: rgba(0,0,0,0.25);
      --title-color: #fff;
      --slider-track: linear-gradient(90deg, #ffffff 0%, #d0d0d0 100%);
      --slider-thumb: #ffffff;
      --slider-thumb-glow: rgba(255,255,255,0.6);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      background: transparent;
      overflow: hidden;
      color: var(--text);
    }

    /* Widget container */
    .widget-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      padding: 12px 16px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      max-width: 480px;
      margin: 0;
    }

    /* Alignment classes */
    .align-left {
      margin-left: 0;
      margin-right: auto;
    }

    .align-center {
      margin-left: auto;
      margin-right: auto;
    }

    .align-right {
      margin-left: auto;
      margin-right: 0;
    }

    /* Artwork */
    .art-wrap {
      width: 150px;
      height: 150px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .art-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
    }

    .play-btn {
      width: 100%;
      max-width: 120px;
      height: 36px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: #fff;
      color: #000;
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }

    .volume-wrap {
      width: 100%;
      max-width: 160px;
    }

    .volume-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      cursor: pointer;
      background: var(--slider-track);
      outline: none;
      border: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .volume-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--slider-thumb);
      margin-top: -4px;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .volume-bar::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px var(--slider-thumb-glow);
      transform: scale(1.05);
    }

    /* Powered by Radio Nest */
    .powered-by {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.85;
    }

    .powered-by a {
      color: #4da3ff;
      text-decoration: underline;
      font-weight: 600;
      cursor: pointer;
    }

    /* MOBILE/TABLET: Hide volume slider */
    @media (max-width: 1024px) {
      .volume-wrap {
        display: none;
      }
    }

    /* MOBILE: Switch to vertical layout */
    @media (max-width: 480px) {
      .widget-wrap {
        flex-direction: column;
        max-width: 100%;
        padding: 16px;
      }

      .art-wrap {
        width: 180px;
        height: 180px;
      }

      .meta-wrap {
        align-items: center;
        text-align: center;
      }
    }

    /* ⭐ DESKTOP FIX — Always show volume on real desktops */
    @media screen and (min-width: 1025px) {
      .volume-wrap {
        display: block !important;
      }
    }
  </style>
</head>

<body>

<div class="widget-wrap" id="playerArea">

  <div class="art-wrap">
    <img id="artwork" class="art-img" src="" alt="">
    <div id="fallbackChip" class="fallback-chip">NO ARTWORK</div>
  </div>

  <div class="meta-wrap">
    <div class="onair-label"><span>●</span> NOW PLAYING</div>

    <div id="trackTitle" class="track-title">Loading…</div>
    <div id="trackSub" class="track-sub"></div>

    <button id="playButton" class="play-btn">PLAY</button>

    <div class="volume-wrap">
      <input id="volumeBar" class="volume-bar" type="range" min="0" max="100" value="100">
    </div>

    <div class="powered-by">
      <a href="https://myradionest.com" target="_blank">Powered by Radio Nest</a>
    </div>
  </div>
</div>

<script>
  /* Your JS exactly as provided */
  audio.volume = volumeBar ? volumeBar.value / 100 : 1.0;

  if (volumeBar) {
    volumeBar.addEventListener("input", () => {
      audio.volume = volumeBar.value / 100;
    });
  }

  if (metaURL) {
    fetchMetadata();
    setInterval(fetchMetadata, 5000);
  } else {
    applyFallbackMetadata();
  }

  function applyFallbackMetadata() {
    titleEl.textContent = "Live Stream";
    subEl.textContent = "";
    showFallback();
  }

  function showFallback() {
    if (artworkEl.src !== FALLBACK_ART) {
      artworkEl.classList.add("fade");
      setTimeout(() => {
        artworkEl.src = FALLBACK_ART;
        artworkEl.classList.remove("fade");
      }, 200);
    }
    fallbackChip.style.display = "none";
  }

  function sendHistoryUpdate(title, artist, artUrl) {
    if (!title) return;
    const workerUrl = "https://radiohistoryworker.sthelensliveradio.workers.dev/update";
    const url =
      workerUrl +
      `?title=${encodeURIComponent(title)}` +
      `&artist=${encodeURIComponent(artist || "")}` +
      `&art=${encodeURIComponent(artUrl || "")}`;

    fetch(url).catch(() => {});
  }

  async function fetchMetadata() {
    try {
      const res = await fetch(metaURL + "?_=" + Date.now());
      const data = await res.json();

      let source = data.icestats && data.icestats.source;
      if (Array.isArray(source)) source = source[0];
      source = source || {};

      let raw = source.title || "";

      if (!raw.trim()) {
        applyFallbackMetadata();
        return;
      }

      const cleanTitle = raw.trim();

      titleEl.textContent = cleanTitle;
      subEl.textContent = "";

      updateArtwork(cleanTitle, "");

    } catch {
      applyFallbackMetadata();
    }
  }

  async function updateArtwork(title, artist) {
    const query = encodeURIComponent(title.trim());

    if (!query) {
      showFallback();
      sendHistoryUpdate(title, artist, FALLBACK_ART);
      return;
    }

    try {
      const res = await fetch(
        `https://itunes.apple.com/search?term=${query}&entity=song&limit=1`
      );
      const data = await res.json();

      let finalArt = FALLBACK_ART;

      if (data.results && data.results.length > 0) {
        let art = data.results[0].artworkUrl100;
        art = art.replace("100x100bb.jpg", "1200x1200bb.jpg");
        finalArt = art;

        if (artworkEl.src !== art) {
          artworkEl.classList.add("fade");
          setTimeout(() => {
            artworkEl.src = art;
            artworkEl.classList.remove("fade");
          }, 200);
        }

        fallbackChip.style.display = "none";
      } else {
        showFallback();
      }

      sendHistoryUpdate(title, artist, finalArt);

    } catch {
      showFallback();
      sendHistoryUpdate(title, artist, FALLBACK_ART);
    }
  }

  checkLicense().then(valid => {
    if (valid) initPlayer();
  });
</script>

</body>
</html>
